[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Only filings.py is a Python function. It needs the filings package and the
  # scoring package (filings/score.py imports backend.scoring.version, which
  # triggers backend/scoring/__init__.py — that init re-exports the rest).
  included_files = ["backend/__init__.py", "backend/filings/**", "backend/scoring/**"]

[dev]
  command = "npm run dev:frontend"
  port = 3000
  targetPort = 3000

# Schwab OAuth callback — must match the URI registered in the Schwab developer portal exactly
[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/schwab-auth"
  status = 200

[[redirects]]
  from = "/api/schwab-auth"
  to = "/.netlify/functions/schwab-auth"
  status = 200

[[redirects]]
  from = "/api/schwab-status"
  to = "/.netlify/functions/schwab-status"
  status = 200

[[redirects]]
  from = "/api/prices"
  to = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
